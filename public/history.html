<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Production Counter - Riwayat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="history-page">
    <header class="history-header">
      <div class="dashboard-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
        </svg>
        <span>Riwayat Produksi</span>
      </div>
      <div class="header-actions">
        <a class="btn btn-ghost btn-sm" href="/dashboard">Kembali</a>
        <button id="btnLogout" class="btn btn-ghost btn-sm" type="button">Keluar</button>
      </div>
    </header>

    <div class="card">
      <div class="filter-bar">
        <div class="form-group">
          <label for="startDate">Dari tanggal</label>
          <input id="startDate" type="date">
        </div>
        <div class="form-group">
          <label for="endDate">Sampai tanggal</label>
          <input id="endDate" type="date">
        </div>
        <button id="btnApply" class="btn btn-primary" type="button" style="width:auto;">Terapkan</button>
      </div>

      <div id="tableWrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tanggal</th>
              <th>Shift</th>
              <th>Total Barang</th>
              <th>Timestamp Saved</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display:none;">
        Tidak ada data pada rentang tanggal ini.
      </div>
    </div>
  </div>

  <script src="/js/history.js"></script>
</body>
</html>
