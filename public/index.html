<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Production Counter - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
      </div>
      <h1>IoT Production Counter</h1>
      <p>Dashboard Monitoring Produksi Real-Time</p>
    </div>

    <div class="login-card">
      <h2>Masuk ke Dashboard</h2>
      <div id="errorMsg" class="error-msg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Masuk</button>
      </form>
      <p class="login-demo">Demo: username <strong>admin</strong> / password <strong>admin123</strong></p>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
